<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HDFC Mutual Fund — FAQ Assistant - Loading State</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "outline": "#75777f",
                        "primary": "#00081e",
                        "tertiary-fixed": "#ffdbc7",
                        "surface-container": "#efedf1",
                        "on-primary-fixed-variant": "#34466d",
                        "surface-container-high": "#e9e7eb",
                        "background": "#fbf8fc",
                        "surface-tint": "#4c5e86",
                        "on-secondary-container": "#00716d",
                        "on-error-container": "#93000a",
                        "surface-dim": "#dbd9dd",
                        "on-tertiary-fixed": "#311300",
                        "on-primary-container": "#7687b2",
                        "primary-fixed": "#d9e2ff",
                        "on-surface": "#1b1b1e",
                        "error-container": "#ffdad6",
                        "on-tertiary-fixed-variant": "#673c1e",
                        "on-secondary": "#ffffff",
                        "on-background": "#1b1b1e",
                        "on-secondary-fixed-variant": "#00504d",
                        "secondary-container": "#7df6ef",
                        "primary-container": "#0a1f44",
                        "inverse-on-surface": "#f2f0f4",
                        "surface-container-low": "#f5f3f7",
                        "inverse-primary": "#b4c6f4",
                        "error": "#ba1a1a",
                        "surface-container-highest": "#e4e2e5",
                        "on-primary-fixed": "#041a3f",
                        "outline-variant": "#c5c6cf",
                        "surface": "#fbf8fc",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#5ed9d3",
                        "surface-container-lowest": "#ffffff",
                        "primary-fixed-dim": "#b4c6f4",
                        "tertiary-container": "#391700",
                        "inverse-surface": "#303033",
                        "tertiary-fixed-dim": "#f8b992",
                        "secondary": "#006a66",
                        "tertiary": "#150500",
                        "surface-variant": "#e4e2e5",
                        "on-surface-variant": "#44464e",
                        "on-tertiary-container": "#b37c59",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#fbf8fc",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#7df6ef",
                        "on-secondary-fixed": "#00201f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "chat-max-width": "800px",
                        "sm": "8px",
                        "lg": "24px",
                        "base": "4px",
                        "xl": "32px",
                        "container-max": "1200px",
                        "md": "16px",
                        "xxl": "48px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md": ["Inter"],
                        "display-lg": ["Inter"],
                        "headline-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "headline-md-mobile": ["Inter"],
                        "body-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "1.2", "letterSpacing": "0.01em", "fontWeight": "600" }],

                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .fade-up {
            animation: fadeUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-[#f5f7fb] text-on-surface font-body-lg h-full flex flex-col items-center">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-lg bg-primary-container h-[72px] bg-gradient-to-r from-primary-container to-on-primary-fixed-variant shadow-sm shadow-md">
<div class="flex items-center space-x-md">
<span class="text-headline-md font-headline-md font-bold text-on-primary md:text-headline-md text-headline-md-mobile">HDFC Mutual Fund — FAQ Assistant</span>
</div>
<div class="flex items-center">
<span class="text-label-sm font-label-sm text-on-primary-container bg-surface-container-low/10 px-md py-sm rounded-full hidden md:block">Facts-only</span>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="w-full max-w-chat-max-width flex-grow pt-[96px] pb-[120px] px-md md:px-lg flex flex-col space-y-lg overflow-y-auto">
<!-- User Message -->
<div class="flex justify-end w-full">
<div class="bg-gradient-to-br from-primary to-secondary text-on-primary px-lg py-md rounded-2xl rounded-tr-sm shadow-[0px_4px_20px_rgba(10,31,68,0.05)] max-w-[85%] text-body-md font-body-md">
                What is the NAV of HDFC Tax Saver Fund?
            </div>
</div>
<!-- Assistant Loading State -->
<div class="flex justify-start w-full fade-up">
<div class="flex items-end space-x-sm">
<!-- Avatar -->
<div class="w-8 h-8 rounded-full bg-surface flex items-center justify-center shadow-sm border border-outline-variant/30 flex-shrink-0">
<span class="material-symbols-outlined text-secondary text-label-md" style="font-variation-settings: 'FILL' 1;">assured_workload</span>
</div>
<!-- Typing Bubble -->
<div class="bg-surface text-primary px-lg py-md rounded-2xl rounded-tl-sm shadow-[0px_4px_20px_rgba(10,31,68,0.05)] border border-[#e1e8f0] flex items-center space-x-2 h-[48px]">
<div class="w-2 h-2 rounded-full bg-outline typing-dot"></div>
<div class="w-2 h-2 rounded-full bg-outline typing-dot"></div>
<div class="w-2 h-2 rounded-full bg-outline typing-dot"></div>
</div>
</div>
</div>
</main>
<!-- Composer Bar -->
<div class="fixed bottom-0 w-full z-40 bg-surface border-t border-outline-variant shadow-[0px_-4px_20px_rgba(10,31,68,0.05)] flex justify-center">
<div class="w-full max-w-chat-max-width px-md py-md pb-[48px] md:pb-lg flex items-center space-x-md">
<div class="flex-grow relative">
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-[24px] py-md pl-lg pr-xxl text-body-md font-body-md text-on-surface-variant focus:outline-none focus:border-secondary focus:ring-1 focus:ring-secondary shadow-inner opacity-60 cursor-not-allowed" disabled="" placeholder="Assistant is typing..." type="text"/>
</div>
<button class="bg-secondary/60 text-on-secondary rounded-full w-12 h-12 flex items-center justify-center flex-shrink-0 shadow-md cursor-not-allowed transition-all relative overflow-hidden" disabled="">
<span class="material-symbols-outlined absolute inset-0 m-auto flex items-center justify-center animate-spin">progress_activity</span>
</button>
</div>
</div>
<!-- Footer -->
<footer class="fixed bottom-0 w-full z-50 flex flex-col items-center py-md space-y-base border-t border-outline-variant bg-surface-container-lowest hidden">
<span class="text-label-sm font-label-sm text-on-surface-variant">Facts-only. No investment advice.</span>
<div class="flex space-x-md">
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Expense Ratio</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Lock-in</a>
<a class="text-label-sm font-label-sm text-secondary font-bold hover:text-primary transition-colors" href="#">NAV</a>
<a class="text-label-sm font-label-sm text-on-surface-variant hover:text-primary transition-colors" href="#">Exit Load</a>
</div>
</footer>
</body></html>
